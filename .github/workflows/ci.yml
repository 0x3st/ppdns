name: ci

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: RUST_COMPONENTS=rustfmt bash scripts/install-rust-toolchain.sh stable

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Check changelog
        run: bash scripts/check-changelog.sh

      - name: Run tests
        run: cargo test
