services:
  pdns48:
    build:
      context: .
      dockerfile: docker/pdns48/Dockerfile
    container_name: ppdns-pdns48
    ports:
      - "127.0.0.1:5300:5300/tcp"
      - "127.0.0.1:5300:5300/udp"
      - "127.0.0.1:8081:8081/tcp"
    volumes:
      - pdns48-data:/var/lib/powerdns
    healthcheck:
      test: ["CMD", "pdnsutil", "list-all-zones"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

volumes:
  pdns48-data:
